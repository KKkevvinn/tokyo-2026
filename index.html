nav#tabs::-webkit-scrollbar{display:none}
nav#tabs button{flex:0 0 auto; border:0; background:none; padding:12px 14px; font-size:.85rem; color:var(--sub); border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; font-family:inherit}

.item.done .nm{text-decoration:line-through}

.item.done .chk{background:var(--ok); border-color:var(--ok); color:#fff}
.body{flex:1; min-width:0}
.tm{font-size:.72rem; color:var(--accent2); font-weight:700}
.nm{font-size:.95rem; font-weight:600; margin:2px 0}

.badge.altb{background:#fdf3dc; color:#a9770f}

.pics{display:flex; gap:8px; margin-top:8px; overflow-x:auto; padding-bottom:2px}
.pic{width:96px; height:72px; border-radius:9px; object-fit:cover; background:#f1ece3; flex:0 0 auto}

.flight{font-size:.8rem; line-height:1.7; color:var(--ink)}
.hidden{display:none}
.quota{font-size:.68rem; color:var(--sub); text-align:right; margin-top:2px}

  TABS.forEach(t=>{
    const b=document.createElement('button');
    b.textContent=t.label;
    if(t.id===cur)b.classList.add('on');
    b.onclick=()=>{cur=t.id;set('tab',t.id);renderTabs();renderMain();window.scrollTo(0,0)};
    tabsEl.appendChild(b);
  });
}

/* ---------- Wikipedia 參考照(免費公開圖,自動抓+快取) ---------- */
function loadWiki(img,title){
  const c=get('wimg_'+title);
  if(c==='none'){img.remove();return}
  if(c){img.src=c;return}
  fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title))
   .then(r=>r.json())
   .then(j=>{
     const u=j&&j.thumbnail&&j.thumbnail.source;
     if(u){set('wimg_'+title,u);img.src=u}
     else{set('wimg_'+title,'none');img.remove()}
   }).catch(()=>img.remove());
}

/* ---------- Google Drive 共享相簿(Apps Script 中繼) ---------- */
let drivePhotos={}, driveLoaded=false;
function loadDrive(){
  if(!GAS_URL)return;
  fetch(GAS_URL).then(r=>r.json()).then(j=>{
    drivePhotos={};
    (j.files||[]).forEach(f=>{
      if(!f.folderId)return;
      (drivePhotos[f.folderId]=drivePhotos[f.folderId]||[]).push({id:f.id,t:f.t});
    });
    Object.values(drivePhotos).forEach(a=>a.sort((x,y)=>x.t-y.t));
    driveLoaded=true;renderMain();
  }).catch(()=>{driveLoaded=true;renderMain()});
}
function uploadDrive(file,folderId){
  compress(file,url=>{
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({folderId:folderId,name:'IMG_'+Date.now()+'.jpg',dataUrl:url})})
    .then(r=>r.json()).then(j=>{
      if(j.ok){(drivePhotos[folderId]=drivePhotos[folderId]||[]).push({id:j.id,t:Date.now()});renderMain()}
      else{alert('上傳失敗:'+j.error);renderMain()}
    }).catch(()=>{alert('上傳失敗,請確認網路後再試');renderMain()});
  });
}
function delDrive(id,folderId){
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'delete',id:id})})
  .then(()=>{drivePhotos[folderId]=(drivePhotos[folderId]||[]).filter(p=>p.id!==id);renderMain()})
  .catch(()=>alert('刪除失敗,請確認網路'));
}

/* ---------- 照片上傳(壓縮後存 localStorage) ---------- */
function compress(file,cb){
  const r=new FileReader();
  r.onload=e=>{
    const im=new Image();
    im.onload=()=>{
      const MAX=800;
      let w=im.width,h=im.height;
      if(w>h&&w>MAX){h*=MAX/w;w=MAX}else if(h>=w&&h>MAX){w*=MAX/h;h=MAX}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(im,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',.72));
    };
    im.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function quotaTxt(){
  let n=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(LS))n+=(localStorage.getItem(k)||'').length}
  return '本機儲存已用約 '+(n/1024/1024*2).toFixed(1)+' MB / 上限約 5 MB';
}

/* ---------- 每日頁 ---------- */
function renderDay(d){
  const frag=document.createDocumentFragment();
  const head=document.createElement('div');head.className='day-head';
  const doneN=d.items.filter((_,i)=>get('done_'+d.id+'_'+i)).length;
  head.innerHTML='<h2>'+d.title+'</h2><span class="wd">'+d.date+'(週'+d.wd+')</span><span class="prog">'+doneN+'/'+d.items.length+' ✓</span>';
  frag.appendChild(head);
  const stay=document.createElement('p');stay.className='stay';stay.textContent=d.stay;frag.appendChild(stay);

  const mb=document.createElement('div');mb.className='mapbox';
  mb.innerHTML='<iframe loading="lazy" src="https://maps.google.com/maps?q='+encodeURIComponent(d.mapQ)+'&z=12&hl=zh-TW&output=embed"></iframe>';
  if(d.route){
    const a=document.createElement('a');a.className='routebtn';a.target='_blank';a.rel='noopener';
    a.href='https://www.google.com/maps/dir/'+d.route.map(encodeURIComponent).join('/');
    a.textContent='🧭 開啟當天完整路線(Google Maps 導航)';
    mb.appendChild(a);
  }
  frag.appendChild(mb);

  d.items.forEach((it,i)=>{
    const key='done_'+d.id+'_'+i, pkey='photo_'+d.id+'_'+i;
    const el=document.createElement('div');
    el.className='item'+(it.alt?' alt':'')+(get(key)?' done':'');
    const chk=document.createElement('div');chk.className='chk';chk.textContent='✓';
    chk.onclick=()=>{get(key)?del(key):set(key,'1');renderMain();updateOverall()};
    el.appendChild(chk);
    const body=document.createElement('div');body.className='body';
    let badges='';
    if(it.meal)badges+='<span class="badge meal">🍜 餐食</span>';
    if(it.alt)badges+='<span class="badge altb">備選</span>';
    body.innerHTML=(it.t?'<div class="tm">'+it.t+'</div>':'')+
      '<div class="nm">'+it.n+' <span class="badges">'+badges+
      (it.folder?'<a class="alb" href="https://drive.google.com/drive/folders/'+it.folder+'" target="_blank" rel="noopener">📁 相簿</a>':'')+
      '</span></div>'+
      (it.note?'<div class="nt">'+it.note+'</div>':'');
    if(it.folder){ /* 只有景點/餐食有照片欄;交通、上班等沒有 */
      const pics=document.createElement('div');pics.className='pics';
      if(it.wiki){
        const img=document.createElement('img');img.className='pic';img.alt=it.n;img.loading='lazy';
        pics.appendChild(img);loadWiki(img,it.wiki);
      }
      if(GAS_URL){
        (drivePhotos[it.folder]||[]).forEach(ph=>{
          const w=document.createElement('div');w.className='upl';w.style.borderStyle='solid';
          w.innerHTML='<img src="https://drive.google.com/thumbnail?id='+ph.id+'&sz=w400" alt="實拍" loading="lazy">';
          const db=document.createElement('button');db.className='del';db.textContent='×';
          db.onclick=e=>{e.preventDefault();e.stopPropagation();if(confirm('刪除這張雲端照片?'))delDrive(ph.id,it.folder)};
          w.appendChild(db);
          pics.appendChild(w);
        });
        const lab=document.createElement('label');lab.className='upl';
        lab.innerHTML='<span style="font-size:20px">📷</span><span class="ust">'+(driveLoaded?'上傳到雲端':'雲端連線中…')+'</span>';
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
        inp.onchange=()=>{if(inp.files[0]){lab.querySelector('.ust').textContent='上傳中…';uploadDrive(inp.files[0],it.folder)}};
        lab.appendChild(inp);
        pics.appendChild(lab);
      }else{
        const saved=get(pkey);
        const lab=document.createElement('label');lab.className='upl';
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
        inp.onchange=()=>{if(inp.files[0])compress(inp.files[0],url=>{if(set(pkey,url))renderMain()})};
        if(saved){
          lab.innerHTML='<img src="'+saved+'" alt="實拍">';
          const db=document.createElement('button');db.className='del';db.textContent='×';
          db.onclick=e=>{e.preventDefault();e.stopPropagation();del(pkey);renderMain()};
          lab.appendChild(db);
        }else{
          lab.innerHTML='<span style="font-size:20px">📷</span><span>上傳實拍</span>';
        }
        lab.appendChild(inp);
        pics.appendChild(lab);
      }
      body.appendChild(pics);
    }
    el.appendChild(body);
    frag.appendChild(el);
  });

  if(d.id==='d1'){
    const f=document.createElement('div');f.className='sec';
    f.innerHTML='<h3>✈️ 機票備忘</h3><div class="flight">我們:虎航 NT$5,894/星宇 NT$8,438(合計 NT$14,332)<br>妹妹他們:虎航 NT$6,604/星宇 NT$8,452(合計 NT$15,056)</div>';
    frag.appendChild(f);
  }
  const q=document.createElement('div');q.className='quota';
  q.textContent=GAS_URL?'照片存放:Google 雲端共享相簿(全員可見)':quotaTxt();
  frag.appendChild(q);
  return frag;
}

/* ---------- 必吃頁 ---------- */
function renderEat(){
  const frag=document.createDocumentFragment();
  EATS.forEach((c,ci)=>{
    const sec=document.createElement('div');sec.className='sec';
    sec.innerHTML='<h3>'+c.cat+'</h3>';
    c.items.forEach((it,ii)=>{
      const key='eat_'+ci+'_'+ii;
      const row=document.createElement('div');row.className='eat'+(get(key)?' done':'');
      const chk=document.createElement('div');chk.className='chk'+(get(key)?'':'');
      if(get(key)){row.classList.add('done')}
      chk.textContent='✓';
      if(get(key)){chk.style.background='var(--ok)';chk.style.borderColor='var(--ok)';chk.style.color='#fff'}
      chk.onclick=()=>{get(key)?del(key):set(key,'1');renderMain()};
      const b=document.createElement('div');
      b.innerHTML='<div class="en">'+it.n+'</div><div class="ep">💴 '+it.p+'</div>';
      row.appendChild(chk);row.appendChild(b);sec.appendChild(row);
    });
    frag.appendChild(sec);
  });
  const n=document.createElement('p');n.className='note';n.textContent='※ 價位為 2026/7 網路查詢參考價,實際以店家為準。teamLab 為浮動票價、SHIBUYA SKY 日落場次請提早線上購票。';
  frag.appendChild(n);
  return frag;
}

/* ---------- 必買頁 ---------- */
function renderBuy(){
  const frag=document.createDocumentFragment();
  const sec=document.createElement('div');sec.className='sec';
  sec.innerHTML='<h3>🛍️ 必買清單</h3>';
  const custom=JSON.parse(get('buycustom')||'[]');
  const all=[...BUYS,...custom];
  all.forEach((name,i)=>{
    const key='buy_'+i;
    const row=document.createElement('div');row.className='eat'+(get(key)?' done':'');
    const chk=document.createElement('div');chk.className='chk';chk.textContent='✓';
    if(get(key)){chk.style.background='var(--ok)';chk.style.borderColor='var(--ok)';chk.style.color='#fff'}
    chk.onclick=()=>{get(key)?del(key):set(key,'1');renderMain()};
    const b=document.createElement('div');b.innerHTML='<div class="en">'+name+'</div>';
    row.appendChild(chk);row.appendChild(b);
    if(i>=BUYS.length){
      const rm=document.createElement('button');
      rm.textContent='刪除';rm.style.cssText='margin-left:auto;border:0;background:none;color:#c66;font-size:.72rem;cursor:pointer;font-family:inherit';
      rm.onclick=()=>{custom.splice(i-BUYS.length,1);set('buycustom',JSON.stringify(custom));del('buy_'+i);renderMain()};
      row.appendChild(rm);
    }
    sec.appendChild(row);
  });
  const ar=document.createElement('div');ar.className='addrow';
  const inp=document.createElement('input');inp.placeholder='新增想買的東西…';
  const btn=document.createElement('button');btn.textContent='加入';
  btn.onclick=()=>{const v=inp.value.trim();if(!v)return;custom.push(v);set('buycustom',JSON.stringify(custom));renderMain()};
  inp.onkeydown=e=>{if(e.key==='Enter')btn.onclick()};
  ar.appendChild(inp);ar.appendChild(btn);sec.appendChild(ar);
  frag.appendChild(sec);
  const n=document.createElement('p');n.className='note';n.textContent='勾選與自訂項目都存在這支手機的瀏覽器裡(localStorage)。';
  frag.appendChild(n);
  return frag;
}

/* ---------- Overall progress ---------- */
function updateOverall(){
  let total=0,done=0;
  DAYS.forEach(d=>d.items.forEach((_,i)=>{total++;if(get('done_'+d.id+'_'+i))done++}));
  document.getElementById('overallFill').style.width=(total?done/total*100:0)+'%';
  document.getElementById('overallTxt').textContent='整趟旅程達成 '+done+'/'+total;
}

function renderMain(){
  mainEl.innerHTML='';
  const d=DAYS.find(x=>x.id===cur);
  if(d)mainEl.appendChild(renderDay(d));
  else if(cur==='eat')mainEl.appendChild(renderEat());
  else mainEl.appendChild(renderBuy());
  updateOverall();
}
renderTabs();renderMain();loadDrive();
</script>
